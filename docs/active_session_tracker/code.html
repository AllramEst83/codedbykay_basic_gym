<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Active Session Tracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Be+Vietnam+Pro:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#98ffd9",
                    "inverse-primary": "#73d9b5",
                    "on-surface": "#161d1f",
                    "tertiary": "#894e4f",
                    "surface-dim": "#d4dbdd",
                    "surface": "#f4fafd",
                    "surface-bright": "#f4fafd",
                    "on-secondary-fixed": "#191b29",
                    "primary": "#006c52",
                    "tertiary-fixed-dim": "#ffb3b3",
                    "on-surface-variant": "#3e4944",
                    "tertiary-container": "#ffe5e4",
                    "inverse-on-surface": "#ebf2f4",
                    "primary-fixed-dim": "#73d9b5",
                    "surface-container-highest": "#dde4e6",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed": "#370d10",
                    "primary-fixed": "#8ff6d0",
                    "on-tertiary-fixed-variant": "#6d3738",
                    "on-error-container": "#93000a",
                    "surface-container-high": "#e2e9ec",
                    "on-secondary-container": "#626374",
                    "surface-variant": "#dde4e6",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#2b3234",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#965959",
                    "outline": "#6e7a74",
                    "on-background": "#161d1f",
                    "background": "#f4fafd",
                    "surface-tint": "#006c52",
                    "on-primary-fixed": "#002117",
                    "secondary-fixed": "#e1e1f5",
                    "secondary-fixed-dim": "#c5c5d8",
                    "surface-container-low": "#eef5f7",
                    "on-secondary-fixed-variant": "#444655",
                    "outline-variant": "#bdc9c2",
                    "on-tertiary": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#00513d",
                    "surface-container": "#e8eff1",
                    "on-secondary": "#ffffff",
                    "secondary": "#5c5d6e",
                    "on-primary-container": "#00785c",
                    "secondary-container": "#e1e1f5",
                    "tertiary-fixed": "#ffdad9",
                    "error": "#ba1a1a"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "8px",
                    "gutter": "16px",
                    "sm": "12px",
                    "md": "24px",
                    "lg": "40px",
                    "container-margin": "20px",
                    "xl": "64px",
                    "xs": "4px"
            },
            "fontFamily": {
                    "headline-md": ["Plus Jakarta Sans"],
                    "display-lg-mobile": ["Plus Jakarta Sans"],
                    "display-lg": ["Plus Jakarta Sans"],
                    "body-lg": ["Be Vietnam Pro"],
                    "stat-number": ["Plus Jakarta Sans"],
                    "body-md": ["Be Vietnam Pro"],
                    "label-bold": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "display-lg-mobile": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "stat-number": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "800"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-bold": ["14px", {"lineHeight": "20px", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .squish:active {
            transform: scale(0.98);
        }
        .checkmark-animate {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .input-focus-ring:focus-within {
            border-color: #006c52;
            border-width: 2px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen pb-xl antialiased">
<!-- TopAppBar (Transactional - Hidden for active workout per JSON logic, replaced with a contextual header) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl px-container-margin py-base flex justify-between items-center h-xl">
<button aria-label="Pause Workout" class="flex items-center text-primary squish active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[32px]">pause_circle</span>
</button>
<div class="text-center">
<h1 class="font-headline-md text-headline-md text-on-surface">Upper Body Power</h1>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]">schedule</span> 00:45:22
            </p>
</div>
<button aria-label="Workout Settings" class="flex items-center text-primary squish active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[32px]">tune</span>
</button>
</header>
<main class="pt-[88px] px-container-margin pb-[120px] max-w-[1200px] mx-auto md:grid md:grid-cols-12 md:gap-gutter">
<!-- Active Exercise Container -->
<div class="md:col-span-8 md:col-start-3">
<!-- Exercise Header -->
<div class="mb-md">
<div class="flex items-center justify-between mb-sm">
<span class="inline-flex items-center px-sm py-xs bg-secondary-container text-on-secondary-container font-label-bold text-label-bold rounded-full">
                        Chest
                    </span>
<span class="font-body-md text-body-md text-on-surface-variant">Exercise 3 of 6</span>
</div>
<h2 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-primary">Barbell Bench Press</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-xs">Target: 4 Sets x 8-10 Reps</p>
</div>
<!-- Sets List -->
<div class="space-y-sm">
<!-- Completed Set -->
<div class="bg-surface-container-low rounded-lg p-sm flex items-center gap-sm transition-all duration-300">
<div class="w-12 h-12 rounded-full bg-primary flex items-center justify-center text-on-primary shrink-0">
<span class="material-symbols-outlined font-bold">check</span>
</div>
<div class="flex-1 grid grid-cols-2 gap-sm">
<div class="bg-surface rounded p-xs text-center opacity-70">
<span class="font-label-bold text-label-bold text-on-surface-variant block">Weight (kg)</span>
<span class="font-stat-number text-stat-number text-on-surface">80</span>
</div>
<div class="bg-surface rounded p-xs text-center opacity-70">
<span class="font-label-bold text-label-bold text-on-surface-variant block">Reps</span>
<span class="font-stat-number text-stat-number text-on-surface">10</span>
</div>
</div>
</div>
<!-- Active Set -->
<div class="bg-surface-container-highest rounded-lg p-sm flex items-center gap-sm shadow-[0_0_15px_rgba(0,108,82,0.1)] border border-primary/20">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-on-surface-variant shrink-0 font-stat-number text-stat-number">
                        2
                    </div>
<div class="flex-1 grid grid-cols-2 gap-sm">
<div class="bg-surface rounded-lg p-xs text-center input-focus-ring border border-outline-variant transition-colors">
<span class="font-label-bold text-label-bold text-on-surface-variant block mb-1">Weight (kg)</span>
<input class="w-full bg-transparent border-none text-center font-stat-number text-stat-number text-on-surface p-0 focus:ring-0" type="number" value="82.5"/>
</div>
<div class="bg-surface rounded-lg p-xs text-center input-focus-ring border border-outline-variant transition-colors">
<span class="font-label-bold text-label-bold text-on-surface-variant block mb-1">Reps</span>
<input class="w-full bg-transparent border-none text-center font-stat-number text-stat-number text-on-surface p-0 focus:ring-0" type="number" value="8"/>
</div>
</div>
<button class="w-16 h-16 rounded-lg bg-primary-container text-on-primary-container flex items-center justify-center squish shrink-0" onclick="completeSet(this)">
<span class="material-symbols-outlined text-[32px]">check</span>
</button>
</div>
<!-- Upcoming Set -->
<div class="bg-surface-container-low rounded-lg p-sm flex items-center gap-sm opacity-60">
<div class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-on-surface-variant shrink-0 font-stat-number text-stat-number">
                        3
                    </div>
<div class="flex-1 grid grid-cols-2 gap-sm">
<div class="bg-surface rounded p-xs text-center">
<span class="font-label-bold text-label-bold text-on-surface-variant block">Weight (kg)</span>
<span class="font-stat-number text-stat-number text-on-surface">-</span>
</div>
<div class="bg-surface rounded p-xs text-center">
<span class="font-label-bold text-label-bold text-on-surface-variant block">Reps</span>
<span class="font-stat-number text-stat-number text-on-surface">-</span>
</div>
</div>
</div>
</div>
<!-- Rest Timer Preview -->
<div class="mt-lg p-md bg-tertiary-container rounded-xl flex items-center justify-between cursor-pointer squish">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-tertiary-container text-[32px]">timer</span>
<div>
<h3 class="font-label-bold text-label-bold text-on-tertiary-container">Next: Rest Period</h3>
<p class="font-body-md text-body-md text-on-tertiary-container opacity-80">90 seconds</p>
</div>
</div>
<span class="material-symbols-outlined text-on-tertiary-container">chevron_right</span>
</div>
</div>
</main>
<!-- Fixed Bottom Actions (Transactional overrides standard BottomNavBar) -->
<div class="fixed bottom-0 w-full z-50 bg-surface/90 backdrop-blur-xl px-container-margin py-md border-t border-surface-variant flex gap-sm items-center h-[100px]">
<button class="flex-1 h-16 bg-surface-container-highest text-on-surface font-label-bold text-label-bold rounded-full squish">
            Add Note
        </button>
<button class="flex-[2] h-16 bg-primary text-on-primary font-headline-md text-headline-md rounded-full squish shadow-[0_4px_20px_rgba(0,108,82,0.3)]">
            Finish Workout
        </button>
</div>
<script>
        function completeSet(btn) {
            btn.innerHTML = '<span class="material-symbols-outlined text-[32px] checkmark-animate">task_alt</span>';
            btn.classList.remove('bg-primary-container', 'text-on-primary-container');
            btn.classList.add('bg-primary', 'text-on-primary');
            setTimeout(() => {
                // Simulate transition to next state
            }, 500);
        }
    </script>
</body></html>
