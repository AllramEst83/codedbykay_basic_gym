<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    @keyframes soft-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }

    .animate-float {
      animation: soft-pulse 4s ease-in-out infinite;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .animate-spin-slow {
      animation: spin-slow 3s linear infinite;
    }

    .gradient-mesh {
      background: radial-gradient(at 0% 0%, #98ffd9 0%, transparent 50%),
                  radial-gradient(at 100% 0%, #e1e1f5 0%, transparent 50%),
                  radial-gradient(at 100% 100%, #8ff6d0 0%, transparent 50%),
                  radial-gradient(at 0% 100%, #f4fafd 0%, transparent 50%);
      background-color: #ffffff;
    }
  </style>
</head>
<body class="bg-background text-on-background font-body-md text-body-md overflow-hidden h-screen flex flex-col justify-center items-center">
<!-- Atmospheric Background -->
<div class="fixed inset-0 z-0 gradient-mesh opacity-40"></div>
<!-- Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-between h-full w-full max-w-md px-container-margin py-xl">
<!-- Top Spacer for balance -->
<div class="h-xl"></div>
<!-- Central Identity Cluster -->
<div class="flex flex-col items-center gap-md">
<!-- App Icon Container -->
<div class="relative group">
<!-- Soft Inner Glow Effect -->
<div class="absolute -inset-8 bg-primary-container/30 blur-3xl rounded-full opacity-60 group-hover:opacity-100 transition-opacity duration-1000"></div>
<!-- Main Icon -->
<div class="relative w-48 h-48 md:w-56 md:h-56 bg-white rounded-xl shadow-2xl flex items-center justify-center animate-float overflow-hidden">
<img alt="FlexFlow Icon" class="w-full h-full object-cover p-xs" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtCibVMxEJZUtOBuH-tZo5aCV1xzqpAr647F0k5jFF7p61t8SsyWtUm7xrUQxNIjLjqjoSw9otsg9zG6Dlp6WjQsFsGrcxBirzjKvNQ533LuPNrWa2g2WJygK6dKfO-jZP2SzfTfYNfNuCRIhXukf9-919Xuk4zyN01l4pNFy-s-BxoPkma2ta4b5ZVcSsKMl1WsZ_2I4hQXJCqEjiWLUFaRMy-6N5Vuq00e2TaUqygXpYcVb_QuP43hSi3q0ZKmkP-e4fIxg_zgs"/>
</div>
</div>
<!-- Brand Typography -->
<div class="text-center mt-sm">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight md:font-display-lg md:text-display-lg">
          FlexFlow
        </h1>
</div>
</div>
<!-- Bottom Action/Status Cluster -->
<div class="flex flex-col items-center gap-md w-full pb-lg">
<!-- Tagline -->
<p class="font-label-bold text-label-bold text-on-surface-variant tracking-widest uppercase opacity-70">
        Find your flow.
      </p>
<!-- Custom Loading Indicator -->
<div class="relative flex items-center justify-center w-12 h-12">
<!-- Track -->
<svg class="absolute w-full h-full text-secondary-container" viewbox="0 0 32 32">
<circle cx="16" cy="16" fill="none" r="14" stroke="currentColor" stroke-width="3"></circle>
</svg>
<!-- Indicator -->
<svg class="absolute w-full h-full text-primary animate-spin-slow" viewbox="0 0 32 32">
<circle cx="16" cy="16" fill="none" r="14" stroke="currentColor" stroke-dasharray="20 100" stroke-linecap="round" stroke-width="3"></circle>
</svg>
</div>
</div>
</main>
<!-- Interactive Micro-interaction: Script to simulate splash duration or transition -->
<script>
    // Simple tactile feedback simulation on interaction with the icon
    const icon = document.querySelector('.animate-float');
    
    icon.addEventListener('touchstart', () => {
      icon.style.transform = 'scale(0.95)';
      icon.style.transition = 'transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1)';
    });

    icon.addEventListener('touchend', () => {
      icon.style.transform = 'scale(1)';
    });

    // In a real app, logic would go here to navigate after 3-5 seconds
    setTimeout(() => {
      console.log("FlexFlow is ready. Transitioning to main dashboard...");
    }, 3000);
  </script>
